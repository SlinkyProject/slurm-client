services:
  database:
    image: docker.io/mariadb:latest
    hostname: mariadb
    restart: unless-stopped
    # ports:
    #   - 13306:3306
    environment:
      - MARIADB_ALLOW_EMPTY_ROOT_PASSWORD=yes
    networks:
      - default
    healthcheck:
      test: [CMD, healthcheck.sh, --connect, --innodb_initialized]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
  accounting:
    build:
      context: ./compose
      dockerfile_inline: |
        FROM ghcr.io/slinkyproject/slurmdbd:25.11.0-ubuntu24.04
        COPY etc/ /opt/etc/slurm/
        COPY entrypoint/slurmdbd.sh /usr/local/bin/entrypoint.sh
        RUN chmod +x /usr/local/bin/entrypoint.sh
        ENTRYPOINT /usr/local/bin/entrypoint.sh
    hostname: slurmdbd
    restart: unless-stopped
    # ports:
    #   - 16819:6819
    healthcheck:
      test: [CMD-SHELL, bash, sacctmgr, ping]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default
    depends_on:
      database:
        condition: service_healthy
  control-plane:
    build:
      context: ./compose
      dockerfile_inline: |
        FROM ghcr.io/slinkyproject/slurmctld:25.11.0-ubuntu24.04
        COPY etc/ /opt/etc/slurm/
        COPY entrypoint/slurmctld.sh /usr/local/bin/entrypoint.sh
        RUN chmod +x /usr/local/bin/entrypoint.sh
        ENTRYPOINT /usr/local/bin/entrypoint.sh
    hostname: slurmctld
    restart: unless-stopped
    # ports:
    #   - 16817:6817
    healthcheck:
      test: [CMD-SHELL, bash, scontrol, ping]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default
    depends_on:
      accounting:
        condition: service_healthy
  compute:
    privileged: true
    build:
      context: ./compose
      dockerfile_inline: |
        FROM ghcr.io/slinkyproject/slurmd:25.11.0-ubuntu24.04
        COPY etc/ /opt/etc/slurm/
        COPY entrypoint/slurmd.sh /usr/local/bin/entrypoint.sh
        RUN chmod +x /usr/local/bin/entrypoint.sh
        ENTRYPOINT /usr/local/bin/entrypoint.sh
    hostname: slurmd
    restart: unless-stopped
    # ports:
    #   - 16818:6818
    healthcheck:
      test: [CMD-SHELL, bash, scontrol, show, slurmd]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default
    depends_on:
      control-plane:
        condition: service_healthy
  restapi:
    build:
      context: ./compose
      dockerfile_inline: |
        FROM ghcr.io/slinkyproject/slurmrestd:25.11.0-ubuntu24.04
        COPY etc/ /opt/etc/slurm/
        COPY entrypoint/slurmrestd.sh /usr/local/bin/entrypoint.sh
        RUN chmod +x /usr/local/bin/entrypoint.sh
        ENTRYPOINT /usr/local/bin/entrypoint.sh
    hostname: slurmrestd
    environment:
      - SLURMRESTD_SECURITY=disable_unshare_files,disable_unshare_sysv
    restart: unless-stopped
    ports:
      - 16820:6820
    networks:
      - default
    depends_on:
      control-plane:
        condition: service_healthy
      accounting:
        condition: service_healthy
networks:
  default:
    driver: bridge
